<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Payment Verification</title>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const trxId = urlParams.get('transactionId');
            
            // 🔴 ঠিক নিচে আপনার বটের ইউজারনেমটি দিন ( @ ছাড়া, যেমন: test_bot_alif )
            const botUsername = "আপনার_বটের_ইউজারনেম_দিন"; 

            if(trxId) {
                // পেমেন্ট সফল হলে অটোমেটিক টেলিগ্রাম বটে পাঠিয়ে দিবে এবং আইডিটাও সাথে নিয়ে যাবে
                window.location.href = `https://t.me/${botUsername}?start=${trxId}`;
            } else {
                document.body.innerHTML = "<h3 style='color:red;'>Transaction ID not found. Payment may not be successful.</h3>";
            }
        }
    </script>
</head>
<body style="text-align: center; margin-top: 50px; font-family: sans-serif;">
    <h2 style="color: green;">✅ Payment Successful!</h2>
    <p>Redirecting to Telegram Bot...</p>
</body>
</html>
